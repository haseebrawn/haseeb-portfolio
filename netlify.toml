[build]
  command = "npm run build"
  publish = "client/dist"
  functions = "netlify/functions"

[functions]
  external_node_modules = ["express", "mongoose", "serverless-http"]
  node_bundler = "esbuild"

# SPA fallback (React Router)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
