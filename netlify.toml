[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

# If you deploy the API separately (Render/Railway/Fly/VPS), you can proxy
# requests so the frontend can keep using "/api" and "/uploads" in production.
# Replace the target domains below with your live backend URL.

[[redirects]]
  from = "/api/*"
  to = "https://YOUR_BACKEND_DOMAIN/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://YOUR_BACKEND_DOMAIN/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
